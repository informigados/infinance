{% extends 'base.html' %}
{% block title %}Editar Entrada · INFinance{% endblock %}
{% block content %}
<section class="w-full rounded-3xl bg-slate-900 border border-slate-800 p-6">
  <h1 class="if-form-title">Editar entrada</h1>
  <p class="if-form-subtitle">Revise os dados da movimentação para manter os indicadores financeiros e fiscais alinhados.</p>
  <form method="post" class="if-form space-y-4">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-300 mb-2">Cliente</label>
        <select name="client_id" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none" required>
          {% for client in clients %}
          <option value="{{ client.id }}" {% if transaction.client_id == client.id %}selected{% endif %}>{{ client.name }} ({{ client.person_type }})</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm text-slate-300 mb-2">Serviço</label>
        <select name="service_id" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none" required>
          {% for service in services %}
          <option value="{{ service.id }}" {% if transaction.service_id == service.id %}selected{% endif %}>{{ service.name }} · {{ service.tax_rate|percent }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm text-slate-300 mb-2">Valor</label>
        <input type="number" step="0.01" min="0.01" name="amount" value="{{ transaction.amount }}" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none" required>
      </div>
      <div>
        <label class="block text-sm text-slate-300 mb-2">Data</label>
        <input type="date" name="date_received" value="{{ transaction.date_received }}" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none">
      </div>
      <div>
        <label class="block text-sm text-slate-300 mb-2">Canal</label>
        <select name="channel" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none">
          <option value="PJ" {% if transaction.channel == 'PJ' %}selected{% endif %}>PJ</option>
          <option value="PF" {% if transaction.channel == 'PF' %}selected{% endif %}>PF</option>
        </select>
      </div>
    </div>

    <div class="rounded-2xl bg-slate-950 border border-slate-800 p-4 space-y-3">
      <label class="inline-flex items-center gap-3">
        <input type="checkbox" name="invoice_issued" class="w-4 h-4 rounded border-slate-700 bg-slate-900" {% if transaction.invoice_issued %}checked{% endif %}>
        <span>Nota emitida</span>
      </label>
      <input name="invoice_number" value="{{ transaction.invoice_number or '' }}" class="w-full rounded-2xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none" placeholder="Número da nota">
      <textarea name="invoice_description" class="w-full rounded-2xl bg-slate-900 border border-slate-700 px-4 py-3 outline-none min-h-28" placeholder="Descrição usada na nota">{{ transaction.invoice_description or '' }}</textarea>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-300 mb-2">Imposto PF estimado</label>
        <input type="number" step="0.01" min="0" name="expected_pf_tax" value="{{ transaction.expected_pf_tax }}" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none">
      </div>
      <div>
        <label class="block text-sm text-slate-300 mb-2">Status</label>
        <select name="status" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none">
          {% for key, label in TRANSACTION_STATUS.items() %}
            <option value="{{ key }}" {% if transaction.status == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm text-slate-300 mb-2">Observações</label>
      <textarea name="notes" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-3 outline-none min-h-28">{{ transaction.notes or '' }}</textarea>
    </div>

    <div class="if-actions">
      <button type="submit" class="if-btn if-btn-primary if-btn-block">Salvar alterações</button>
      <a href="{{ url_for('transactions') }}" class="if-btn if-btn-secondary if-btn-block">Voltar</a>
    </div>
  </form>
</section>
{% endblock %}
